name: Desktop Release

# This workflow runs in the PUBLIC release repo so GitHub Actions standard
# runners (including macOS) are free. It checks out the PRIVATE desktop source
# repo via SOURCE_REPO_TOKEN; source code stays private.
#
# Two ways to trigger:
#   1. Push a tag `vX.Y.Z` to THIS repo  -> signed release, builds private main
#      HEAD, version taken from the tag name. This is the normal release path.
#   2. workflow_dispatch                 -> manual fallback; bumps the version
#      in the private source repo and tags it, can build any branch.

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      source_ref:
        description: Branch of the private source repo to build from
        required: true
        default: main
        type: string
      bump:
        description: Version bump to apply when exact_version is empty
        required: true
        default: patch
        type: choice
        options:
          - patch
          - minor
          - major
          - prerelease
      exact_version:
        description: Exact semver version, for example 0.2.0
        required: false
        type: string
      preid:
        description: Prerelease identifier used with bump=prerelease
        required: false
        default: beta
        type: string
      prerelease:
        description: Mark the public release as prerelease
        required: true
        default: false
        type: boolean
      draft:
        description: Create the public release as draft
        required: true
        default: false
        type: boolean
      mac_artifact_mode:
        description: "macOS artifacts to build: update skips DMG, installer includes DMG"
        required: true
        default: update
        type: choice
        options:
          - update
          - installer
      runtime_artifact_mode:
        description: "Provider runtime artifacts: auto reuses the runtime channel, force rebuilds, skip disables"
        required: true
        default: auto
        type: choice
        options:
          - auto
          - force
          - skip
permissions:
  contents: write

env:
  COREPACK_ENABLE_DOWNLOAD_PROMPT: "0"

concurrency:
  group: desktop-release
  cancel-in-progress: false

jobs:
  prepare:
    name: Resolve version
    runs-on: ubuntu-latest
    env:
      APPLE_SIGN_IDENTITY: ${{ secrets.APPLE_SIGN_IDENTITY }}
      APPLE_ID: ${{ secrets.APPLE_ID }}
      APPLE_ID_PASSWORD: ${{ secrets.APPLE_ID_PASSWORD }}
      APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
      APPLE_CERTIFICATE_BASE64: ${{ secrets.APPLE_CERTIFICATE_BASE64 }}
      APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
    outputs:
      version: ${{ steps.version.outputs.version }}
      tag: ${{ steps.version.outputs.tag }}
      build_ref: ${{ steps.version.outputs.build_ref }}
      prerelease: ${{ steps.mode.outputs.prerelease }}
      draft: ${{ steps.mode.outputs.draft }}
      mac_artifact_mode: ${{ steps.mode.outputs.mac_artifact_mode }}
      runtime_artifact_mode: ${{ steps.mode.outputs.runtime_artifact_mode }}
    steps:
      - name: Resolve release mode
        id: mode
        shell: bash
        run: |
          set -euo pipefail
          if [ "${{ github.event_name }}" = "push" ]; then
            # Tag-triggered releases are always signed and final.
            echo "prerelease=false" >> "${GITHUB_OUTPUT}"
            echo "draft=false" >> "${GITHUB_OUTPUT}"
            echo "mac_artifact_mode=update" >> "${GITHUB_OUTPUT}"
            echo "runtime_artifact_mode=auto" >> "${GITHUB_OUTPUT}"
          else
            echo "prerelease=${{ inputs.prerelease }}" >> "${GITHUB_OUTPUT}"
            echo "draft=${{ inputs.draft }}" >> "${GITHUB_OUTPUT}"
            echo "mac_artifact_mode=${{ inputs.mac_artifact_mode }}" >> "${GITHUB_OUTPUT}"
            echo "runtime_artifact_mode=${{ inputs.runtime_artifact_mode }}" >> "${GITHUB_OUTPUT}"
          fi

      - name: Require macOS signing secrets
        shell: bash
        run: |
          set -euo pipefail

          missing=()
          for name in \
            APPLE_SIGN_IDENTITY \
            APPLE_CERTIFICATE_BASE64 \
            APPLE_CERTIFICATE_PASSWORD \
            APPLE_ID \
            APPLE_ID_PASSWORD \
            APPLE_TEAM_ID
          do
            if [ -z "${!name:-}" ]; then
              missing+=("${name}")
            fi
          done

          if [ "${#missing[@]}" -gt 0 ]; then
            echo "Missing required macOS signing secret(s): ${missing[*]}" >&2
            echo "Configure Apple Developer ID signing and notarization secrets before publishing desktop releases." >&2
            exit 1
          fi

          if [ "${APPLE_SIGN_IDENTITY}" = "-" ]; then
            echo "APPLE_SIGN_IDENTITY must be a Developer ID signing identity, not '-'." >&2
            exit 1
          fi

      - name: Checkout source
        if: github.event_name == 'workflow_dispatch'
        uses: actions/checkout@v4
        with:
          repository: aka-danielZhang/openturtle
          ref: ${{ inputs.source_ref }}
          token: ${{ secrets.SOURCE_REPO_TOKEN }}
          fetch-depth: 0

      - name: Setup Node.js
        if: github.event_name == 'workflow_dispatch'
        uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Configure git
        if: github.event_name == 'workflow_dispatch'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Resolve version and tag
        id: version
        shell: bash
        run: |
          set -euo pipefail

          if [ "${{ github.event_name }}" = "push" ]; then
            # Version comes from the tag pushed to this repo.
            tag="${{ github.ref_name }}"
            version="${tag#v}"
            build_ref="main"
          else
            # Manual dispatch: bump the version in the private source repo,
            # commit and tag it, then build that tag.
            cd apps/desktop
            if [ -n "${{ inputs.exact_version }}" ]; then
              raw_version="$(npm version "${{ inputs.exact_version }}" --no-git-tag-version)"
            elif [ "${{ inputs.bump }}" = "prerelease" ]; then
              raw_version="$(npm version prerelease --preid "${{ inputs.preid }}" --no-git-tag-version)"
            else
              raw_version="$(npm version "${{ inputs.bump }}" --no-git-tag-version)"
            fi

            version="${raw_version#v}"
            tag="v${version}"
            cd ../..

            if git rev-parse "${tag}" >/dev/null 2>&1; then
              echo "Tag ${tag} already exists in source repository" >&2
              exit 1
            fi

            git add apps/desktop/package.json
            git commit -m "chore(desktop): release ${tag}"
            git tag "${tag}"
            git push origin "HEAD:${{ inputs.source_ref }}"
            git push origin "${tag}"
            build_ref="${tag}"
          fi

          echo "version=${version}" >> "${GITHUB_OUTPUT}"
          echo "tag=${tag}" >> "${GITHUB_OUTPUT}"
          echo "build_ref=${build_ref}" >> "${GITHUB_OUTPUT}"

  build:
    name: Build ${{ matrix.label }}
    needs: prepare
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - label: windows-x64
            os: windows-2022
            forge_platform: win32
            arch: x64
            mac_app_dir: ''
          - label: macos-x64
            os: macos-15
            forge_platform: darwin
            arch: x64
            mac_app_dir: mac
          - label: macos-arm64
            os: macos-15
            forge_platform: darwin
            arch: arm64
            mac_app_dir: mac-arm64
    env:
      APPLE_SIGN_IDENTITY: ${{ secrets.APPLE_SIGN_IDENTITY }}
      APPLE_ID: ${{ secrets.APPLE_ID }}
      APPLE_ID_PASSWORD: ${{ secrets.APPLE_ID_PASSWORD }}
      APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
      APPLE_CERTIFICATE_BASE64: ${{ secrets.APPLE_CERTIFICATE_BASE64 }}
      APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
      WINDOWS_CERTIFICATE_PASSWORD: ${{ secrets.WINDOWS_CERTIFICATE_PASSWORD }}
      WINDOWS_SIGN_WITH_PARAMS: ${{ secrets.WINDOWS_SIGN_WITH_PARAMS }}
      OPENTURTLE_WINDOWS_ICON_URL: https://github.com/GuoxinShan/openturtle-desktop-releases/releases/download/${{ needs.prepare.outputs.tag }}/OpenTurtle.OS.ico
      MAC_ARTIFACT_MODE: ${{ needs.prepare.outputs.mac_artifact_mode }}
      PROVIDER_RUNTIME_RELEASE_TAG: provider-runtimes
      RUNTIME_ARTIFACT_MODE: ${{ needs.prepare.outputs.runtime_artifact_mode }}
    steps:
      - name: Checkout source
        uses: actions/checkout@v4
        with:
          repository: aka-danielZhang/openturtle
          ref: ${{ needs.prepare.outputs.build_ref }}
          token: ${{ secrets.SOURCE_REPO_TOKEN }}
          fetch-depth: 1

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Set package version from release tag
        if: github.event_name == 'push'
        shell: bash
        run: |
          set -euo pipefail
          cd apps/desktop
          npm version "${{ needs.prepare.outputs.version }}" --no-git-tag-version --allow-same-version

      - name: Setup pnpm with Corepack
        shell: bash
        run: |
          corepack enable
          corepack prepare pnpm@9.15.0 --activate
          pnpm --version

      - name: Configure pnpm store
        shell: bash
        run: pnpm config set store-dir .pnpm-store

      - name: Restore pnpm store cache
        id: pnpm-store-cache
        uses: actions/cache/restore@v4
        with:
          path: .pnpm-store
          key: ${{ runner.os }}-pnpm-store-${{ hashFiles('pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-pnpm-store-

      - name: Restore Electron download cache
        uses: actions/cache@v4
        with:
          path: |
            ~/.cache/electron
            ~/Library/Caches/electron
            ~/AppData/Local/electron/Cache
          key: ${{ runner.os }}-electron-${{ matrix.arch }}-${{ hashFiles('pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-electron-${{ matrix.arch }}-
            ${{ runner.os }}-electron-

      - name: Restore Electron Builder cache
        uses: actions/cache@v4
        with:
          path: |
            ~/.cache/electron-builder
            ~/Library/Caches/electron-builder
            ~/AppData/Local/electron-builder
            ~/AppData/Local/electron-builder/Cache
          key: ${{ runner.os }}-electron-builder-${{ matrix.arch }}-${{ hashFiles('pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-electron-builder-${{ matrix.arch }}-
            ${{ runner.os }}-electron-builder-

      - name: Restore Windows certificate
        if: runner.os == 'Windows'
        shell: pwsh
        env:
          WINDOWS_CERTIFICATE_BASE64: ${{ secrets.WINDOWS_CERTIFICATE_BASE64 }}
        run: |
          if (-not [string]::IsNullOrWhiteSpace($env:WINDOWS_CERTIFICATE_BASE64)) {
            $certPath = Join-Path $env:RUNNER_TEMP "windows-signing.pfx"
            [IO.File]::WriteAllBytes($certPath, [Convert]::FromBase64String($env:WINDOWS_CERTIFICATE_BASE64))
            "WINDOWS_CERTIFICATE_FILE=$certPath" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
          }

      - name: Require macOS signing secrets
        if: runner.os == 'macOS'
        shell: bash
        run: |
          set -euo pipefail

          missing=()
          for name in \
            APPLE_SIGN_IDENTITY \
            APPLE_CERTIFICATE_BASE64 \
            APPLE_CERTIFICATE_PASSWORD \
            APPLE_ID \
            APPLE_ID_PASSWORD \
            APPLE_TEAM_ID
          do
            if [ -z "${!name:-}" ]; then
              missing+=("${name}")
            fi
          done

          if [ "${#missing[@]}" -gt 0 ]; then
            echo "Missing required macOS signing secret(s): ${missing[*]}" >&2
            echo "Configure Apple Developer ID signing and notarization secrets before publishing macOS desktop releases." >&2
            exit 1
          fi

          if [ "${APPLE_SIGN_IDENTITY}" = "-" ]; then
            echo "APPLE_SIGN_IDENTITY must be a Developer ID signing identity, not '-'." >&2
            exit 1
          fi

      - name: Import macOS signing certificate
        if: runner.os == 'macOS'
        shell: bash
        run: |
          certificate_path="${RUNNER_TEMP}/macos-signing.p12"
          keychain_path="${RUNNER_TEMP}/app-signing.keychain-db"
          keychain_password="$(uuidgen)"

          echo -n "${APPLE_CERTIFICATE_BASE64}" | base64 --decode -o "${certificate_path}"
          security create-keychain -p "${keychain_password}" "${keychain_path}"
          security set-keychain-settings -lut 21600 "${keychain_path}"
          security unlock-keychain -p "${keychain_password}" "${keychain_path}"
          security import "${certificate_path}" -P "${APPLE_CERTIFICATE_PASSWORD}" -A -t cert -f pkcs12 -k "${keychain_path}"
          security list-keychains -d user -s "${keychain_path}"
          security default-keychain -s "${keychain_path}"
          security set-key-partition-list -S apple-tool:,apple: -s -k "${keychain_password}" "${keychain_path}"
          builder_identity="${APPLE_SIGN_IDENTITY#Developer ID Application: }"
          echo "MACOS_SIGNING_KEYCHAIN=${keychain_path}" >> "${GITHUB_ENV}"
          echo "CSC_KEYCHAIN=${keychain_path}" >> "${GITHUB_ENV}"
          echo "CSC_NAME=${builder_identity}" >> "${GITHUB_ENV}"
          echo "APPLE_APP_SPECIFIC_PASSWORD=${APPLE_ID_PASSWORD}" >> "${GITHUB_ENV}"

      - name: Validate macOS signing identity
        if: runner.os == 'macOS'
        shell: bash
        run: |
          set -euo pipefail

          security find-identity -v -p codesigning "${MACOS_SIGNING_KEYCHAIN}" | tee "${RUNNER_TEMP}/codesigning-identities.txt"

          if ! grep -F "${APPLE_SIGN_IDENTITY}" "${RUNNER_TEMP}/codesigning-identities.txt" >/dev/null; then
            echo "APPLE_SIGN_IDENTITY was not found in the imported macOS signing certificate." >&2
            exit 1
          fi

      - name: Install dependencies
        run: pnpm --filter @openturtle/desktop... install --frozen-lockfile --prefer-offline

      - name: Save pnpm store cache
        if: ${{ steps.pnpm-store-cache.outputs.cache-hit != 'true' && (matrix.label == 'windows-x64' || matrix.label == 'macos-arm64') }}
        uses: actions/cache/save@v4
        with:
          path: .pnpm-store
          key: ${{ steps.pnpm-store-cache.outputs.cache-primary-key }}

      - name: Guard desktop auto-update quit path
        if: matrix.label == 'windows-x64'
        run: pnpm test:desktop-update-guard

      - name: Build desktop
        run: pnpm --filter @openturtle/desktop build

      - name: Package renderer resource update
        if: matrix.label == 'macos-arm64'
        shell: bash
        env:
          TAG: ${{ needs.prepare.outputs.tag }}
          VERSION: ${{ needs.prepare.outputs.version }}
          RELEASE_REPOSITORY: GuoxinShan/openturtle-desktop-releases
        run: |
          set -euo pipefail

          update_dir="apps/desktop/out/renderer-update"
          zip_name="OpenTurtle.OS-renderer-${VERSION}.zip"
          manifest_path="${update_dir}/renderer-update.json"
          versioned_manifest_path="${update_dir}/OpenTurtle.OS-renderer-${VERSION}.json"
          mkdir -p "${update_dir}"
          rm -f "${update_dir}/${zip_name}" "${manifest_path}" "${versioned_manifest_path}"

          (cd apps/desktop/dist/renderer && zip -qry "../../out/renderer-update/${zip_name}" .)
          sha256="$(shasum -a 256 "${update_dir}/${zip_name}" | awk '{print $1}')"
          size="$(wc -c < "${update_dir}/${zip_name}" | tr -d ' ')"

          cat > "${manifest_path}" <<EOF
          {
            "version": "${VERSION}",
            "minShellVersion": "${VERSION}",
            "url": "https://github.com/${RELEASE_REPOSITORY}/releases/download/${TAG}/${zip_name}",
            "sha256": "${sha256}",
            "size": ${size},
            "createdAt": "$(date -u +"%Y-%m-%dT%H:%M:%SZ")"
          }
          EOF
          cp "${manifest_path}" "${versioned_manifest_path}"


      - name: Package provider runtime artifacts
        if: needs.prepare.outputs.runtime_artifact_mode != 'skip'
        shell: bash
        env:
          RELEASE_REPOSITORY: GuoxinShan/openturtle-desktop-releases
          RUNTIME_PLATFORM: ${{ matrix.forge_platform }}
          RUNTIME_ARCH: ${{ matrix.arch }}
        run: |
          set -euo pipefail
          node <<'NODE'
          const fs = require('node:fs')
          const path = require('node:path')
          const crypto = require('node:crypto')
          const { execFileSync } = require('node:child_process')

          const platform = process.env.RUNTIME_PLATFORM
          const arch = process.env.RUNTIME_ARCH
          const releaseRepository = process.env.RELEASE_REPOSITORY
          const runtimeReleaseTag = process.env.PROVIDER_RUNTIME_RELEASE_TAG || 'provider-runtimes'
          const runtimeArtifactMode = process.env.RUNTIME_ARTIFACT_MODE || 'auto'
          const outDir = path.join('apps', 'desktop', 'out', 'provider-runtimes')
          fs.mkdirSync(outDir, { recursive: true })

          const binaryExt = platform === 'win32' ? '.exe' : ''
          const specs = [
            {
              provider: 'acp-claude',
              runtime: 'claude',
              packageName: `@anthropic-ai/claude-agent-sdk-${platform}-${arch}`,
              executable: `@anthropic-ai/claude-agent-sdk-${platform}-${arch}/claude${binaryExt}`,
            },
            {
              provider: 'acp-codex',
              runtime: 'codex-acp',
              packageName: `@zed-industries/codex-acp-${platform}-${arch}`,
              executable: `@zed-industries/codex-acp-${platform}-${arch}/bin/codex-acp${binaryExt}`,
            },
          ]

          function sha256(filePath) {
            const hash = crypto.createHash('sha256')
            hash.update(fs.readFileSync(filePath))
            return hash.digest('hex')
          }

          function nodeModulePath(packageName) {
            return path.join('node_modules', ...packageName.split('/'))
          }

          function packageVersion(packageDir) {
            const packageJsonPath = path.join(packageDir, 'package.json')
            if (!fs.existsSync(packageJsonPath)) return null
            const packageJson = JSON.parse(fs.readFileSync(packageJsonPath, 'utf8'))
            return String(packageJson.version || '').trim() || null
          }

          function siblingPackageVersion(packageName) {
            const parts = packageName.split('/')
            if (parts.length !== 2) return null
            const scopeDir = path.join('node_modules', parts[0])
            const targetPrefix = parts[1].replace(new RegExp(`-${platform}-${arch}$`), `-${platform}-`)
            if (!fs.existsSync(scopeDir) || targetPrefix === parts[1]) return null
            for (const entry of fs.readdirSync(scopeDir)) {
              if (!entry.startsWith(targetPrefix)) continue
              const version = packageVersion(path.join(scopeDir, entry))
              if (version) return version
            }
            return null
          }

          function materializePackage(packageName, version) {
            const existingDir = nodeModulePath(packageName)
            if (fs.existsSync(path.join(existingDir, 'package.json'))) {
              return {
                packageDir: existingDir,
                tarRoot: 'node_modules',
                tarEntry: `./${packageName}`,
              }
            }

            const tmpRoot = path.join(outDir, `.runtime-package-${packageName.replace(/[^a-zA-Z0-9_.-]/g, '-')}`)
            fs.rmSync(tmpRoot, { recursive: true, force: true })
            fs.mkdirSync(tmpRoot, { recursive: true })
            const packOutput = execFileSync(
              'npm',
              ['pack', `${packageName}@${version}`, '--pack-destination', tmpRoot],
              { encoding: 'utf8', stdio: ['ignore', 'pipe', 'inherit'] },
            ).trim()
            const packedName = packOutput.split(/\r?\n/).filter(Boolean).pop()
            if (!packedName) throw new Error(`npm pack produced no output for ${packageName}@${version}`)
            execFileSync('tar', ['-xzf', path.join(tmpRoot, path.basename(packedName)), '-C', tmpRoot], { stdio: 'inherit' })
            const materializedRoot = path.join(tmpRoot, 'node_modules')
            const materializedDir = path.join(materializedRoot, ...packageName.split('/'))
            fs.mkdirSync(path.dirname(materializedDir), { recursive: true })
            fs.renameSync(path.join(tmpRoot, 'package'), materializedDir)
            return {
              packageDir: materializedDir,
              tarRoot: materializedRoot,
              tarEntry: `./${packageName}`,
            }
          }

          function fetchJson(url) {
            try {
              const output = execFileSync(
                'node',
                [
                  '-e',
                  `
                  const https = require('node:https');
                  const url = process.argv[1];
                  https.get(url, { headers: { 'User-Agent': 'openturtle-runtime-publisher' } }, (res) => {
                    if (res.statusCode >= 300 && res.statusCode < 400 && res.headers.location) {
                      console.log(JSON.stringify({ redirect: new URL(res.headers.location, url).toString() }));
                      res.resume();
                      return;
                    }
                    if (res.statusCode < 200 || res.statusCode >= 300) {
                      console.log(JSON.stringify({ error: 'HTTP ' + res.statusCode }));
                      res.resume();
                      return;
                    }
                    let body = '';
                    res.setEncoding('utf8');
                    res.on('data', chunk => { body += chunk; });
                    res.on('end', () => process.stdout.write(body));
                  }).on('error', err => {
                    console.log(JSON.stringify({ error: err.message }));
                  });
                  `,
                  url,
                ],
                { encoding: 'utf8' },
              ).trim()
              if (!output) return null
              const parsed = JSON.parse(output)
              if (parsed.redirect) return fetchJson(parsed.redirect)
              if (parsed.error) return null
              return parsed
            } catch {
              return null
            }
          }

          const existingManifest = runtimeArtifactMode === 'force'
            ? null
            : fetchJson(`https://github.com/${releaseRepository}/releases/download/${runtimeReleaseTag}/provider-runtime-manifest.json`)
          const existingRuntimes = Array.isArray(existingManifest?.runtimes)
            ? existingManifest.runtimes
            : []

          function existingRuntimeEntry(spec, version) {
            return existingRuntimes.find((entry) => (
              entry.provider === spec.provider &&
              entry.runtime === spec.runtime &&
              entry.platform === platform &&
              entry.arch === arch &&
              entry.version === version
            ))
          }

          const entries = []
          for (const spec of specs) {
            const installedVersion = packageVersion(nodeModulePath(spec.packageName))
            const version = installedVersion || siblingPackageVersion(spec.packageName)
            if (!version) {
              console.log(`[runtime] skip missing ${spec.packageName}; no sibling version found`)
              continue
            }
            const existingEntry = existingRuntimeEntry(spec, version)
            if (existingEntry) {
              console.log(`[runtime] reuse ${spec.runtime} ${platform}-${arch} ${version} from ${runtimeReleaseTag}`)
              continue
            }
            const materialized = materializePackage(spec.packageName, version)
            const resolvedVersion = packageVersion(materialized.packageDir) || version
            const fileName = `OpenTurtle.OS-runtime-${spec.runtime}-${platform}-${arch}-${resolvedVersion}.tar.gz`
            const outPath = path.join(outDir, fileName)
            execFileSync('tar', ['-czf', outPath, '-C', materialized.tarRoot, materialized.tarEntry], { stdio: 'inherit' })
            const digest = sha256(outPath)
            entries.push({
              provider: spec.provider,
              runtime: spec.runtime,
              platform,
              arch,
              version: resolvedVersion,
              url: `https://github.com/${releaseRepository}/releases/download/${runtimeReleaseTag}/${fileName}`,
              sha256: digest,
              executable: spec.executable,
            })
          }

          if (entries.length > 0) {
            fs.writeFileSync(
              path.join(outDir, `provider-runtime-manifest-${platform}-${arch}.json`),
              JSON.stringify({ runtimes: entries }, null, 2),
            )
          }
          NODE

      - name: Make Windows desktop artifacts
        if: runner.os == 'Windows'
        shell: pwsh
        working-directory: apps/desktop
        run: |
          $ErrorActionPreference = 'Stop'
          pnpm exec electron-builder --win nsis --x64 --publish never --config electron-builder.config.cjs
          Get-ChildItem -Path out/builder -Recurse | Select-Object -ExpandProperty FullName

      - name: Make macOS desktop artifacts
        if: runner.os == 'macOS'
        shell: bash
        run: |
          set -euo pipefail
          mac_targets=(zip)
          if [ "${MAC_ARTIFACT_MODE}" = "installer" ]; then
            mac_targets=(dmg zip)
          fi
          pnpm --filter @openturtle/desktop exec electron-builder --mac "${mac_targets[@]}" --${{ matrix.arch }} --publish never --config electron-builder.config.cjs

      - name: Verify macOS signature and notarization
        if: runner.os == 'macOS'
        shell: bash
        run: |
          set -euo pipefail

          app_path="apps/desktop/out/builder/${{ matrix.mac_app_dir }}/OpenTurtle OS.app"

          if [ ! -d "${app_path}" ]; then
            echo "Packaged macOS app not found: ${app_path}" >&2
            exit 1
          fi

          codesign --verify --deep --strict --verbose=4 "${app_path}"
          signature_info="$(codesign -dv --verbose=4 "${app_path}" 2>&1)"
          printf '%s\n' "${signature_info}"

          if printf '%s\n' "${signature_info}" | grep -q 'Signature=adhoc'; then
            echo "macOS app was ad-hoc signed instead of Developer ID signed: ${app_path}" >&2
            exit 1
          fi

          if ! printf '%s\n' "${signature_info}" | grep -q "TeamIdentifier=${APPLE_TEAM_ID}"; then
            echo "macOS app TeamIdentifier does not match APPLE_TEAM_ID: ${app_path}" >&2
            exit 1
          fi

          xcrun stapler validate "${app_path}"
          spctl -a -vv -t exec "${app_path}"

      - name: Verify macOS architecture artifacts
        if: runner.os == 'macOS'
        shell: bash
        run: |
          set -euo pipefail

          version="${{ needs.prepare.outputs.version }}"
          arch="${{ matrix.arch }}"
          out_dir="apps/desktop/out/builder"
          expected_artifacts=(
            "${out_dir}/OpenTurtle.OS-darwin-${arch}-${version}.zip"
            "${out_dir}/OpenTurtle.OS-darwin-${arch}-${version}.zip.blockmap"
          )
          if [ "${MAC_ARTIFACT_MODE}" = "installer" ]; then
            expected_artifacts+=("${out_dir}/OpenTurtle.OS-darwin-${arch}-${version}.dmg")
          fi

          for artifact in "${expected_artifacts[@]}"; do
            if [ ! -f "${artifact}" ]; then
              echo "Expected macOS architecture artifact not found: ${artifact}" >&2
              exit 1
            fi
          done

          feed_path="${out_dir}/latest-mac.yml"
          test -f "${feed_path}"
          grep -F "OpenTurtle.OS-darwin-${arch}-${version}.zip" "${feed_path}"
          if grep -F "darwin-universal" "${feed_path}"; then
            echo "latest-mac.yml must not reference universal macOS update artifacts." >&2
            exit 1
          fi
          cp "${feed_path}" "${out_dir}/latest-mac-${arch}.yml"

      - name: Smoke test packaged app (Windows)
        if: runner.os == 'Windows'
        working-directory: apps/desktop
        run: pnpm smoke:packaged

      - name: Smoke test packaged app (macOS)
        if: runner.os == 'macOS'
        env:
          OPENTURTLE_PACKAGED_EXE: apps/desktop/out/builder/${{ matrix.mac_app_dir }}/OpenTurtle OS.app/Contents/MacOS/OpenTurtle OS
        run: pnpm --filter @openturtle/desktop smoke:packaged

      - name: Upload desktop artifacts
        uses: actions/upload-artifact@v4
        with:
          name: desktop-${{ matrix.label }}-${{ needs.prepare.outputs.tag }}
          path: |
            apps/desktop/out/builder/*.dmg
            apps/desktop/out/builder/*.zip
            apps/desktop/out/builder/*.exe
            apps/desktop/out/builder/*.yml
            apps/desktop/out/builder/*.blockmap
            apps/desktop/out/builder/mac*/*.dmg
            apps/desktop/out/builder/mac*/*.zip
            apps/desktop/out/renderer-update/*.zip
            apps/desktop/out/renderer-update/*.json
            apps/desktop/out/provider-runtimes/*
            apps/desktop/assets/icon.ico
          if-no-files-found: error

  publish:
    name: Publish public release assets
    needs:
      - prepare
      - build
    runs-on: ubuntu-latest
    env:
      GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      TAG: ${{ needs.prepare.outputs.tag }}
      VERSION: ${{ needs.prepare.outputs.version }}
      RELEASE_REPOSITORY: GuoxinShan/openturtle-desktop-releases
      RELEASE_DRAFT: ${{ needs.prepare.outputs.draft }}
      RELEASE_PRERELEASE: ${{ needs.prepare.outputs.prerelease }}
      MAC_ARTIFACT_MODE: ${{ needs.prepare.outputs.mac_artifact_mode }}
      PROVIDER_RUNTIME_RELEASE_TAG: provider-runtimes
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-assets

      - name: Create or update public release
        shell: bash
        run: |
          set -euo pipefail
          shopt -s globstar nullglob

          notes_file="release-notes.md"
          {
            echo "OpenTurtle OS Desktop ${TAG}"
            echo
            echo "Recommended downloads:"
            echo "- Windows x64: https://github.com/${RELEASE_REPOSITORY}/releases/download/${TAG}/OpenTurtleOSSetup.exe"
            if [ "${MAC_ARTIFACT_MODE}" = "installer" ]; then
              echo "- macOS Apple Silicon: https://github.com/${RELEASE_REPOSITORY}/releases/download/${TAG}/OpenTurtle.OS-darwin-arm64-${VERSION}.dmg"
              echo "- macOS Intel: https://github.com/${RELEASE_REPOSITORY}/releases/download/${TAG}/OpenTurtle.OS-darwin-x64-${VERSION}.dmg"
            else
              echo "- macOS Apple Silicon update archive: https://github.com/${RELEASE_REPOSITORY}/releases/download/${TAG}/OpenTurtle.OS-darwin-arm64-${VERSION}.zip"
              echo "- macOS Intel update archive: https://github.com/${RELEASE_REPOSITORY}/releases/download/${TAG}/OpenTurtle.OS-darwin-x64-${VERSION}.zip"
            fi
            echo
            echo "Attached ZIP, NUPKG, blockmap, and RELEASES files are update feed artifacts for the desktop auto-updater."
          } > "${notes_file}"

          release_args=(
            "--repo" "${RELEASE_REPOSITORY}"
            "--title" "OpenTurtle OS ${TAG}"
            "--notes-file" "${notes_file}"
            "--target" "main"
          )
          if [ "${RELEASE_DRAFT}" = "true" ]; then
            release_args+=("--draft")
          fi
          if [ "${RELEASE_PRERELEASE}" = "true" ]; then
            release_args+=("--prerelease")
          fi

          if gh release view "${TAG}" --repo "${RELEASE_REPOSITORY}" >/dev/null 2>&1; then
            gh release edit "${TAG}" \
              --repo "${RELEASE_REPOSITORY}" \
              --title "OpenTurtle OS ${TAG}" \
              --notes-file "${notes_file}"
          else
            gh release create "${TAG}" "${release_args[@]}"
          fi

          rm -rf release-upload
          mkdir -p release-upload
          for asset in release-assets/**/*; do
            if [ ! -f "${asset}" ]; then
              continue
            fi

            base="$(basename "${asset}")"
            normalized="${base// /.}"
            case "${asset}" in
              *renderer-update/*)
                normalized="${base}"
                ;;
              */latest-mac.yml|*/latest-mac-*.yml)
                continue
                ;;
              *provider-runtimes/*)
                continue
                ;;
              *provider-runtime-manifest-*.json)
                continue
                ;;
              *OpenTurtleOSSetup.exe)
                normalized="OpenTurtleOSSetup.exe"
                ;;
              */assets/icon.ico)
                normalized="OpenTurtle.OS.ico"
                ;;
              */RELEASES)
                normalized="RELEASES"
                ;;
            esac

            cp "${asset}" "release-upload/${normalized}"
            if [[ "${normalized}" == OpenTurtle.OS-win-x64-"${VERSION}".exe ]]; then
              cp "${asset}" "release-upload/OpenTurtleOSSetup.exe"
            fi
          done

          runtime_upload_dir="runtime-channel-upload"
          runtime_existing_dir="runtime-channel-existing"
          rm -rf "${runtime_upload_dir}" "${runtime_existing_dir}"
          mkdir -p "${runtime_upload_dir}" "${runtime_existing_dir}"

          if gh release download "${PROVIDER_RUNTIME_RELEASE_TAG}" \
            --repo "${RELEASE_REPOSITORY}" \
            -p provider-runtime-manifest.json \
            -D "${runtime_existing_dir}" >/dev/null 2>&1; then
            existing_runtime_manifest="${runtime_existing_dir}/provider-runtime-manifest.json"
          else
            existing_runtime_manifest=""
          fi

          node <<'NODE'
          const fs = require('node:fs')
          const path = require('node:path')

          const root = 'release-assets'
          const out = 'release-upload/latest-mac.yml'
          const version = process.env.VERSION

          function walk(dir) {
            const entries = []
            for (const entry of fs.readdirSync(dir, { withFileTypes: true })) {
              const fullPath = path.join(dir, entry.name)
              if (entry.isDirectory()) entries.push(...walk(fullPath))
              else if (entry.isFile()) entries.push(fullPath)
            }
            return entries
          }

          function findFeed(arch) {
            const name = `latest-mac-${arch}.yml`
            const match = walk(root).find((file) => path.basename(file) === name)
            if (!match) throw new Error(`Missing ${name}`)
            return match
          }

          function parseFeed(file) {
            const text = fs.readFileSync(file, 'utf8')
            const entries = []
            const regex = /-\s+url:\s+([^\n]+)\n\s+sha512:\s+([^\n]+)\n\s+size:\s+([0-9]+)/g
            let match
            while ((match = regex.exec(text)) !== null) {
              entries.push({
                url: match[1].trim(),
                sha512: match[2].trim(),
                size: Number(match[3]),
              })
            }
            return entries
          }

          const byUrl = new Map()
          for (const arch of ['x64', 'arm64']) {
            for (const entry of parseFeed(findFeed(arch))) {
              byUrl.set(entry.url, entry)
            }
          }

          const orderedUrls = [
            `OpenTurtle.OS-darwin-x64-${version}.zip`,
            `OpenTurtle.OS-darwin-arm64-${version}.zip`,
          ]
          if (process.env.MAC_ARTIFACT_MODE === 'installer') {
            orderedUrls.push(
              `OpenTurtle.OS-darwin-x64-${version}.dmg`,
              `OpenTurtle.OS-darwin-arm64-${version}.dmg`,
            )
          }
          const entries = orderedUrls.map((url) => byUrl.get(url))
          const missing = orderedUrls.filter((url, index) => !entries[index])
          if (missing.length > 0) {
            throw new Error(`Missing mac update entries: ${missing.join(', ')}`)
          }

          const primary = entries[0]
          const lines = [
            `version: ${version}`,
            'files:',
            ...entries.flatMap((entry) => [
              `  - url: ${entry.url}`,
              `    sha512: ${entry.sha512}`,
              `    size: ${entry.size}`,
            ]),
            `path: ${primary.url}`,
            `sha512: ${primary.sha512}`,
            `releaseDate: '${new Date().toISOString()}'`,
          ]
          fs.writeFileSync(out, `${lines.join('\n')}\n`)
          NODE


          EXISTING_RUNTIME_MANIFEST="${existing_runtime_manifest}" \
          RUNTIME_UPLOAD_DIR="${runtime_upload_dir}" \
          node <<'NODE'
          const fs = require('node:fs')
          const path = require('node:path')

          function walk(dir) {
            const entries = []
            if (!fs.existsSync(dir)) return entries
            for (const entry of fs.readdirSync(dir, { withFileTypes: true })) {
              const fullPath = path.join(dir, entry.name)
              if (entry.isDirectory()) entries.push(...walk(fullPath))
              else if (entry.isFile()) entries.push(fullPath)
            }
            return entries
          }

          function runtimeKey(entry) {
            return [
              entry.provider,
              entry.runtime,
              entry.platform,
              entry.arch,
            ].join('|')
          }

          const byKey = new Map()
          const existingManifestPath = process.env.EXISTING_RUNTIME_MANIFEST
          if (existingManifestPath && fs.existsSync(existingManifestPath)) {
            const existing = JSON.parse(fs.readFileSync(existingManifestPath, 'utf8'))
            if (Array.isArray(existing.runtimes)) {
              for (const entry of existing.runtimes) byKey.set(runtimeKey(entry), entry)
            }
          }

          const newEntries = []
          for (const file of walk('release-assets')) {
            if (!/^provider-runtime-manifest-.+\.json$/.test(path.basename(file))) continue
            const manifest = JSON.parse(fs.readFileSync(file, 'utf8'))
            if (Array.isArray(manifest.runtimes)) newEntries.push(...manifest.runtimes)
          }

          const uploadDir = process.env.RUNTIME_UPLOAD_DIR
          if (newEntries.length > 0) {
            for (const entry of newEntries) byKey.set(runtimeKey(entry), entry)
            const runtimes = [...byKey.values()].sort((left, right) => (
              runtimeKey(left).localeCompare(runtimeKey(right))
            ))
            fs.mkdirSync(uploadDir, { recursive: true })
            fs.writeFileSync(
              path.join(uploadDir, 'provider-runtime-manifest.json'),
              JSON.stringify(
                {
                  version: process.env.VERSION,
                  createdAt: new Date().toISOString(),
                  runtimes,
                },
                null,
                2,
              ) + '\n',
            )

            for (const file of walk('release-assets')) {
              if (!/^OpenTurtle\.OS-runtime-.+\.tar\.gz$/.test(path.basename(file))) continue
              fs.copyFileSync(file, path.join(uploadDir, path.basename(file)))
            }
          }
          NODE

          if compgen -G "${runtime_upload_dir}/*" > /dev/null; then
            runtime_notes_file="runtime-release-notes.md"
            {
              echo "OpenTurtle provider runtime channel"
              echo
              echo "This release stores reusable Claude/Codex ACP runtime artifacts."
              echo "Desktop app releases read provider-runtime-manifest.json from this channel."
            } > "${runtime_notes_file}"

            if gh release view "${PROVIDER_RUNTIME_RELEASE_TAG}" --repo "${RELEASE_REPOSITORY}" >/dev/null 2>&1; then
              gh release edit "${PROVIDER_RUNTIME_RELEASE_TAG}" \
                --repo "${RELEASE_REPOSITORY}" \
                --title "OpenTurtle Provider Runtimes" \
                --notes-file "${runtime_notes_file}"
            else
              gh release create "${PROVIDER_RUNTIME_RELEASE_TAG}" \
                --repo "${RELEASE_REPOSITORY}" \
                --title "OpenTurtle Provider Runtimes" \
                --notes-file "${runtime_notes_file}" \
                --target "main"
            fi

            ls -lh "${runtime_upload_dir}"
            gh release upload "${PROVIDER_RUNTIME_RELEASE_TAG}" "${runtime_upload_dir}"/* --repo "${RELEASE_REPOSITORY}" --clobber
          else
            echo "No provider runtime changes; keeping ${PROVIDER_RUNTIME_RELEASE_TAG} unchanged."
          fi

          ls -lh release-upload
          gh release upload "${TAG}" release-upload/* --repo "${RELEASE_REPOSITORY}" --clobber
