name: desktop-release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      source_ref:
        description: Source ref to build from
        required: false
        default: main
      source_repository:
        description: Source repository to check out
        required: true
        default: aka-danielZhang/openturtle-os
      release_repository:
        description: Public release repository
        required: true
        default: GuoxinShan/openturtle-desktop-releases
      release_tag:
        description: Release tag. Defaults to the pushed tag or desktop package version.
        required: false
        default: ''
      runtime_artifact_mode:
        description: Provider runtime artifact mode
        required: true
        type: choice
        default: auto
        options:
          - auto
          - force
          - skip
      windows_signature_policy:
        description: Windows Authenticode signature policy
        required: true
        type: choice
        default: skip
        options:
          - skip
          - require

permissions:
  contents: write

concurrency:
  group: desktop-release-${{ github.ref_name }}
  cancel-in-progress: false

env:
  SOURCE_REPOSITORY: ${{ inputs.source_repository || 'aka-danielZhang/openturtle-os' }}
  SOURCE_REF: ${{ inputs.source_ref || (github.event_name == 'push' && 'main') || github.ref }}
  RELEASE_REPOSITORY: ${{ inputs.release_repository || 'GuoxinShan/openturtle-desktop-releases' }}
  RUNTIME_ARTIFACT_MODE: ${{ inputs.runtime_artifact_mode || 'auto' }}
  WINDOWS_SIGNATURE_POLICY: ${{ inputs.windows_signature_policy || 'skip' }}

jobs:
  resolve-release:
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    outputs:
      release_tag: ${{ steps.release.outputs.release_tag }}
      release_repository: ${{ steps.release.outputs.release_repository }}
      runtime_artifact_mode: ${{ steps.release.outputs.runtime_artifact_mode }}
      windows_signature_policy: ${{ steps.release.outputs.windows_signature_policy }}
      source_sha: ${{ steps.release.outputs.source_sha }}
      cross_repository_release: ${{ steps.release.outputs.cross_repository_release }}
    steps:
      - name: Check out source
        uses: actions/checkout@v4
        with:
          repository: ${{ env.SOURCE_REPOSITORY }}
          ref: ${{ env.SOURCE_REF }}
          token: ${{ secrets.SOURCE_REPO_TOKEN || github.token }}
          fetch-depth: 0

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Resolve release inputs
        id: release
        shell: bash
        env:
          INPUT_RELEASE_TAG: ${{ inputs.release_tag }}
        run: |
          set -euo pipefail
          package_version="$(node -p "require('./packages/frontend/apps/desktop/package.json').version")"
          release_tag="${INPUT_RELEASE_TAG:-}"
          if [ -z "$release_tag" ]; then
            if [[ "${GITHUB_REF:-}" == refs/tags/* ]]; then
              release_tag="${GITHUB_REF_NAME}"
            else
              release_tag="v${package_version}"
            fi
          fi
          source_sha="$(git rev-parse HEAD)"
          cross_repository_release="false"
          if [ "${RELEASE_REPOSITORY}" != "${SOURCE_REPOSITORY}" ]; then
            cross_repository_release="true"
          fi
          echo "release_tag=$release_tag" >> "$GITHUB_OUTPUT"
          echo "release_repository=${RELEASE_REPOSITORY}" >> "$GITHUB_OUTPUT"
          echo "runtime_artifact_mode=${RUNTIME_ARTIFACT_MODE}" >> "$GITHUB_OUTPUT"
          echo "windows_signature_policy=${WINDOWS_SIGNATURE_POLICY}" >> "$GITHUB_OUTPUT"
          echo "source_sha=$source_sha" >> "$GITHUB_OUTPUT"
          echo "cross_repository_release=$cross_repository_release" >> "$GITHUB_OUTPUT"

  release-preflight:
    name: release preflight
    needs: resolve-release
    runs-on: ubuntu-24.04
    timeout-minutes: 5
    steps:
      - name: Check out source
        uses: actions/checkout@v4
        with:
          repository: ${{ env.SOURCE_REPOSITORY }}
          ref: ${{ env.SOURCE_REF }}
          token: ${{ secrets.SOURCE_REPO_TOKEN || github.token }}
          fetch-depth: 0

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Validate release inputs and secrets
        env:
          RELEASE_KIND: full
          RELEASE_REPOSITORY: ${{ needs.resolve-release.outputs.release_repository }}
          RELEASE_TAG: ${{ needs.resolve-release.outputs.release_tag }}
          RUNTIME_ARTIFACT_MODE: ${{ needs.resolve-release.outputs.runtime_artifact_mode }}
          WINDOWS_SIGNATURE_POLICY: ${{ needs.resolve-release.outputs.windows_signature_policy }}
          WORKFLOW_REPOSITORY: ${{ github.repository }}
          GITHUB_REF_TYPE: ${{ github.ref_type }}
          GITHUB_REF_NAME: ${{ github.ref_name }}
          RELEASE_REPOSITORY_TOKEN: ${{ secrets.RELEASE_REPOSITORY_TOKEN }}
          GITHUB_TOKEN: ${{ github.token }}
          APPLE_SIGN_IDENTITY: ${{ secrets.APPLE_SIGN_IDENTITY }}
          APPLE_CERTIFICATE_BASE64: ${{ secrets.APPLE_CERTIFICATE_BASE64 }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD || secrets.APPLE_ID_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          WINDOWS_CSC_LINK: ${{ secrets.WINDOWS_CSC_LINK }}
          WINDOWS_CSC_KEY_PASSWORD: ${{ secrets.WINDOWS_CSC_KEY_PASSWORD }}
        shell: bash
        run: node packages/frontend/scripts/desktop-release-preflight.mjs

  package:
    name: package ${{ matrix.target.platform }}-${{ matrix.target.arch }}
    needs:
      - resolve-release
      - release-preflight
    strategy:
      fail-fast: false
      matrix:
        target:
          - platform: darwin
            arch: arm64
            assetPlatform: darwin
            runner: macos-15
            make: make:mac:installer
          - platform: win32
            arch: x64
            assetPlatform: win
            runner: windows-2025
            make: make:win
    runs-on: ${{ matrix.target.runner }}
    timeout-minutes: 90
    steps:
      - name: Check out source
        uses: actions/checkout@v4
        with:
          repository: ${{ env.SOURCE_REPOSITORY }}
          ref: ${{ env.SOURCE_REF }}
          token: ${{ secrets.SOURCE_REPO_TOKEN || github.token }}
          fetch-depth: 0

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Install dependencies
        shell: bash
        run: |
          corepack enable
          pnpm --filter @openturtle/desktop... install --frozen-lockfile

      - name: Import macOS signing certificate
        if: matrix.target.platform == 'darwin'
        shell: bash
        env:
          APPLE_SIGN_IDENTITY: ${{ secrets.APPLE_SIGN_IDENTITY }}
          APPLE_CERTIFICATE_BASE64: ${{ secrets.APPLE_CERTIFICATE_BASE64 }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD || secrets.APPLE_ID_PASSWORD }}
        run: |
          set -euo pipefail
          certificate_path="${RUNNER_TEMP}/macos-signing.p12"
          keychain_path="${RUNNER_TEMP}/app-signing.keychain-db"
          keychain_password="$(uuidgen)"

          echo -n "${APPLE_CERTIFICATE_BASE64}" | base64 --decode -o "${certificate_path}"
          security create-keychain -p "${keychain_password}" "${keychain_path}"
          security set-keychain-settings -lut 21600 "${keychain_path}"
          security unlock-keychain -p "${keychain_password}" "${keychain_path}"
          security import "${certificate_path}" -P "${APPLE_CERTIFICATE_PASSWORD}" -A -t cert -f pkcs12 -k "${keychain_path}"
          security list-keychains -d user -s "${keychain_path}"
          security default-keychain -s "${keychain_path}"
          security set-key-partition-list -S apple-tool:,apple: -s -k "${keychain_password}" "${keychain_path}"
          builder_identity="${APPLE_SIGN_IDENTITY#Developer ID Application: }"
          echo "CSC_KEYCHAIN=${keychain_path}" >> "${GITHUB_ENV}"
          echo "CSC_NAME=${builder_identity}" >> "${GITHUB_ENV}"
          echo "APPLE_APP_SPECIFIC_PASSWORD=${APPLE_APP_SPECIFIC_PASSWORD}" >> "${GITHUB_ENV}"

      - name: Validate macOS signing identity
        if: matrix.target.platform == 'darwin'
        shell: bash
        env:
          APPLE_SIGN_IDENTITY: ${{ secrets.APPLE_SIGN_IDENTITY }}
        run: |
          set -euo pipefail
          security find-identity -v -p codesigning "${CSC_KEYCHAIN}" | tee "${RUNNER_TEMP}/codesigning-identities.txt"
          if ! grep -F "${APPLE_SIGN_IDENTITY}" "${RUNNER_TEMP}/codesigning-identities.txt" >/dev/null; then
            echo "APPLE_SIGN_IDENTITY was not found in the imported macOS signing certificate." >&2
            exit 1
          fi

      - name: Build desktop app
        working-directory: packages/frontend
        run: pnpm --filter @openturtle/desktop build

      - name: Configure Windows signing environment
        if: matrix.target.platform == 'win32' && needs.resolve-release.outputs.windows_signature_policy == 'require'
        shell: bash
        env:
          WINDOWS_CSC_LINK: ${{ secrets.WINDOWS_CSC_LINK }}
          WINDOWS_CSC_KEY_PASSWORD: ${{ secrets.WINDOWS_CSC_KEY_PASSWORD }}
        run: |
          set -euo pipefail
          echo "CSC_LINK=${WINDOWS_CSC_LINK}" >> "${GITHUB_ENV}"
          echo "CSC_KEY_PASSWORD=${WINDOWS_CSC_KEY_PASSWORD}" >> "${GITHUB_ENV}"

      - name: Build desktop package
        working-directory: packages/frontend/apps/desktop
        env:
          RELEASE_REPOSITORY: ${{ needs.resolve-release.outputs.release_repository }}
          APPLE_SIGN_IDENTITY: ${{ secrets.APPLE_SIGN_IDENTITY }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD || secrets.APPLE_ID_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: pnpm run ${{ matrix.target.make }}

      - name: Run packaged release gate
        working-directory: packages/frontend
        env:
          RELEASE_REPOSITORY: ${{ needs.resolve-release.outputs.release_repository }}
          OPENTURTLE_UPDATE_REPO: ${{ needs.resolve-release.outputs.release_repository }}
          OPENTURTLE_WINDOWS_SIGNATURE_POLICY: ${{ needs.resolve-release.outputs.windows_signature_policy }}
        run: pnpm run smoke:packaged-release

      - name: Upload packaged release evidence
        uses: actions/upload-artifact@v4
        with:
          name: desktop-release-evidence-${{ matrix.target.platform }}-${{ matrix.target.arch }}
          if-no-files-found: error
          path: packages/frontend/apps/desktop/out/smoke/*.json

      - name: Verify packaged release assets
        shell: bash
        run: |
          set -euo pipefail
          shopt -s nullglob
          files=(packages/frontend/apps/desktop/out/builder/OpenTurtle.OS-${{ matrix.target.assetPlatform }}-${{ matrix.target.arch }}-*)
          if [ "${#files[@]}" -eq 0 ]; then
            echo "No packaged release assets matched OpenTurtle.OS-${{ matrix.target.assetPlatform }}-${{ matrix.target.arch }}-*" >&2
            find packages/frontend/apps/desktop/out/builder -maxdepth 1 -type f -print | sort >&2 || true
            exit 1
          fi
          printf 'Packaged release asset: %s\n' "${files[@]}"

      - name: Upload packaged release assets
        uses: actions/upload-artifact@v4
        with:
          name: desktop-release-assets-${{ matrix.target.platform }}-${{ matrix.target.arch }}
          if-no-files-found: error
          path: |
            packages/frontend/apps/desktop/out/builder/OpenTurtle.OS-${{ matrix.target.assetPlatform }}-${{ matrix.target.arch }}-*
            packages/frontend/apps/desktop/out/builder/latest-mac.yml
            packages/frontend/apps/desktop/out/builder/latest.yml
            packages/frontend/apps/desktop/out/builder/*.blockmap
            packages/frontend/apps/desktop/out/builder/*.nupkg

  renderer-assets:
    name: renderer update assets
    needs:
      - resolve-release
      - release-preflight
    runs-on: ubuntu-24.04
    timeout-minutes: 45
    steps:
      - name: Check out source
        uses: actions/checkout@v4
        with:
          repository: ${{ env.SOURCE_REPOSITORY }}
          ref: ${{ env.SOURCE_REF }}
          token: ${{ secrets.SOURCE_REPO_TOKEN || github.token }}
          fetch-depth: 0

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Install dependencies
        run: |
          corepack enable
          pnpm --filter @openturtle/desktop... install --frozen-lockfile

      - name: Resolve renderer version
        id: renderer
        shell: bash
        run: |
          set -euo pipefail
          version="$(node -p "require('./packages/frontend/apps/desktop/package.json').version")"
          echo "version=$version" >> "$GITHUB_OUTPUT"

      - name: Build desktop renderer
        working-directory: packages/frontend
        run: pnpm --filter @openturtle/desktop build

      - name: Package renderer update assets
        working-directory: packages/frontend
        env:
          RELEASE_REPOSITORY: ${{ needs.resolve-release.outputs.release_repository }}
          RELEASE_TAG: ${{ needs.resolve-release.outputs.release_tag }}
          RENDERER_VERSION: ${{ steps.renderer.outputs.version }}
          MIN_SHELL_VERSION: ${{ steps.renderer.outputs.version }}
        run: pnpm run package:renderer-update

      - name: Upload renderer release assets
        uses: actions/upload-artifact@v4
        with:
          name: desktop-release-assets-renderer
          if-no-files-found: error
          path: |
            packages/frontend/apps/desktop/dist/OpenTurtle.OS-renderer-${{ steps.renderer.outputs.version }}.zip
            packages/frontend/apps/desktop/dist/OpenTurtle.OS-renderer-${{ steps.renderer.outputs.version }}.json
            packages/frontend/apps/desktop/dist/renderer-update.json

  provider-runtime:
    name: provider runtime force gate
    needs:
      - resolve-release
      - release-preflight
    if: needs.resolve-release.outputs.runtime_artifact_mode == 'force'
    runs-on: macos-15
    timeout-minutes: 90
    steps:
      - name: Check out source
        uses: actions/checkout@v4
        with:
          repository: ${{ env.SOURCE_REPOSITORY }}
          ref: ${{ env.SOURCE_REF }}
          token: ${{ secrets.SOURCE_REPO_TOKEN || github.token }}
          fetch-depth: 0

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Install dependencies
        run: |
          corepack enable
          pnpm --filter @openturtle/desktop... install --frozen-lockfile

      - name: Prepare OpenCode provider runtime assets
        working-directory: packages/frontend
        env:
          RELEASE_REPOSITORY: ${{ needs.resolve-release.outputs.release_repository }}
          RUNTIME_ARTIFACT_MODE: force
        run: pnpm run prepare:provider-runtime-opencode-release

      - name: Verify OpenCode provider runtime assets before upload
        id: verify-provider-runtime-assets
        working-directory: packages/frontend
        run: pnpm run verify:provider-runtime-opencode-release-assets

      - name: Upload OpenCode provider runtime assets
        working-directory: packages/frontend
        env:
          GH_TOKEN: ${{ secrets.RELEASE_REPOSITORY_TOKEN || github.token }}
          RELEASE_REPOSITORY: ${{ needs.resolve-release.outputs.release_repository }}
        run: |
          if [ -z "${GH_TOKEN:-}" ]; then
            echo "RELEASE_REPOSITORY_TOKEN is required to upload provider runtime assets" >&2
            exit 1
          fi
          if ! gh release view provider-runtimes --repo "$RELEASE_REPOSITORY" >/dev/null 2>&1; then
            gh release create provider-runtimes \
              --repo "$RELEASE_REPOSITORY" \
              --title "Provider runtimes" \
              --notes "OpenTurtle OS provider runtime assets" \
              --latest=false
          fi
          gh release edit provider-runtimes \
            --repo "$RELEASE_REPOSITORY" \
            --latest=false
          gh release upload provider-runtimes \
            "${{ steps.verify-provider-runtime-assets.outputs.manifest_path }}" \
            "${{ steps.verify-provider-runtime-assets.outputs.tar_path }}" \
            --repo "$RELEASE_REPOSITORY" \
            --clobber

      - name: Verify provider runtimes public release
        working-directory: packages/frontend
        env:
          GH_TOKEN: ${{ secrets.RELEASE_REPOSITORY_TOKEN || github.token }}
          RELEASE_REPOSITORY: ${{ needs.resolve-release.outputs.release_repository }}
        run: pnpm run verify:provider-runtime-public-release -- apps/desktop/out/smoke/provider-runtime-opencode-release-assets-darwin-arm64.json

      - name: Upload provider runtimes public release evidence
        uses: actions/upload-artifact@v4
        with:
          name: desktop-release-evidence-provider-runtime-public-darwin-arm64
          if-no-files-found: error
          path: packages/frontend/out/provider-runtime-public-release/provider-runtime-public-release-darwin-arm64.json

      - name: Run strict remote provider runtime gate
        working-directory: packages/frontend
        env:
          RELEASE_REPOSITORY: ${{ needs.resolve-release.outputs.release_repository }}
        run: pnpm run smoke:provider-runtime-release-gate:remote

      - name: Upload provider runtime evidence
        uses: actions/upload-artifact@v4
        with:
          name: desktop-release-evidence-provider-runtime-darwin-arm64
          if-no-files-found: error
          path: |
            packages/frontend/apps/desktop/out/smoke/provider-runtime-release-gate-remote-darwin-arm64.json
            packages/frontend/apps/desktop/out/smoke/provider-runtime-opencode-release-assets-darwin-arm64.json

      - name: Upload provider runtime assets
        uses: actions/upload-artifact@v4
        with:
          name: desktop-release-provider-runtime-assets-darwin-arm64
          if-no-files-found: error
          path: |
            packages/frontend/apps/desktop/out/provider-runtimes/provider-runtime-manifest-darwin-arm64.json
            ${{ steps.verify-provider-runtime-assets.outputs.manifest_path }}
            ${{ steps.verify-provider-runtime-assets.outputs.tar_path }}

  audit-release-evidence:
    needs:
      - resolve-release
      - package
      - renderer-assets
      - provider-runtime
    if: ${{ always() && needs.resolve-release.result == 'success' && needs.package.result == 'success' && needs.renderer-assets.result == 'success' && ((needs.resolve-release.outputs.runtime_artifact_mode == 'force' && needs.provider-runtime.result == 'success') || (needs.resolve-release.outputs.runtime_artifact_mode != 'force' && needs.provider-runtime.result == 'skipped')) }}
    runs-on: ubuntu-24.04
    timeout-minutes: 30
    steps:
      - name: Check out source
        uses: actions/checkout@v4
        with:
          repository: ${{ env.SOURCE_REPOSITORY }}
          ref: ${{ env.SOURCE_REF }}
          token: ${{ secrets.SOURCE_REPO_TOKEN || github.token }}
          fetch-depth: 0

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Install dependencies
        run: |
          corepack enable
          pnpm --filter @openturtle/desktop... install --frozen-lockfile

      - name: Download evidence artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: desktop-release-evidence-*
          path: out/desktop-release-evidence
          merge-multiple: true

      - name: Download provider runtime assets for evidence audit
        if: needs.resolve-release.outputs.runtime_artifact_mode == 'force'
        uses: actions/download-artifact@v4
        with:
          pattern: desktop-release-provider-runtime-assets-*
          path: out/desktop-release-evidence
          merge-multiple: true

      - name: Audit downloaded evidence bundle
        working-directory: packages/frontend
        env:
          OPENTURTLE_RELEASE_EVIDENCE_DIR: ${{ github.workspace }}/out/desktop-release-evidence
          OPENTURTLE_RELEASE_EVIDENCE_BUNDLE_TARGETS: ${{ needs.resolve-release.outputs.runtime_artifact_mode == 'force' && 'darwin:arm64:packaged,win32:x64:packaged,darwin:arm64:provider-runtime' || 'darwin:arm64:packaged,win32:x64:packaged' }}
          OPENTURTLE_RELEASE_REPOSITORY: ${{ needs.resolve-release.outputs.release_repository }}
          OPENTURTLE_RELEASE_TAG: ${{ needs.resolve-release.outputs.release_tag }}
          OPENTURTLE_RELEASE_SOURCE_REPOSITORY: ${{ env.SOURCE_REPOSITORY }}
          OPENTURTLE_RELEASE_SOURCE_SHA: ${{ needs.resolve-release.outputs.source_sha }}
          OPENTURTLE_RELEASE_WORKFLOW_RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
          OPENTURTLE_RUNTIME_ARTIFACT_MODE: ${{ needs.resolve-release.outputs.runtime_artifact_mode }}
        run: pnpm run verify:release-evidence:bundle

      - name: Upload release evidence bundle
        uses: actions/upload-artifact@v4
        with:
          name: desktop-release-evidence-bundle
          if-no-files-found: error
          path: out/desktop-release-evidence/release-evidence-bundle-*.json

  publish-release:
    needs:
      - resolve-release
      - package
      - renderer-assets
      - audit-release-evidence
    runs-on: ubuntu-24.04
    timeout-minutes: 20
    steps:
      - name: Check out source
        uses: actions/checkout@v4
        with:
          repository: ${{ env.SOURCE_REPOSITORY }}
          ref: ${{ env.SOURCE_REF }}
          token: ${{ secrets.SOURCE_REPO_TOKEN || github.token }}
          fetch-depth: 0

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Enable Corepack
        run: corepack enable

      - name: Download packaged and renderer assets
        uses: actions/download-artifact@v4
        with:
          pattern: desktop-release-assets-*
          path: out/desktop-release-assets
          merge-multiple: true

      - name: Download release evidence bundle
        uses: actions/download-artifact@v4
        with:
          name: desktop-release-evidence-bundle
          path: out/desktop-release-evidence-bundle

      - name: Audit release asset set
        run: node packages/frontend/scripts/verify-desktop-release-assets.mjs out/desktop-release-assets out/desktop-release-assets-upload.txt

      - name: Ensure public release exists
        env:
          GH_TOKEN: ${{ secrets.RELEASE_REPOSITORY_TOKEN || github.token }}
          RELEASE_REPOSITORY: ${{ needs.resolve-release.outputs.release_repository }}
          RELEASE_TAG: ${{ needs.resolve-release.outputs.release_tag }}
          RELEASE_TARGET_SHA: ${{ needs.resolve-release.outputs.source_sha }}
          RELEASE_SOURCE_REPOSITORY: ${{ env.SOURCE_REPOSITORY }}
          RELEASE_CROSS_REPOSITORY: ${{ needs.resolve-release.outputs.cross_repository_release }}
          RELEASE_WORKFLOW_RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: |
          set -euo pipefail
          if [ -z "${GH_TOKEN:-}" ]; then
            echo "RELEASE_REPOSITORY_TOKEN is required to create the desktop release" >&2
            exit 1
          fi
          source_marker="Source: ${RELEASE_SOURCE_REPOSITORY}@${RELEASE_TARGET_SHA}"
          run_marker="Run: ${RELEASE_WORKFLOW_RUN_URL}"
          if ! gh release view "$RELEASE_TAG" --repo "$RELEASE_REPOSITORY" >/dev/null 2>&1; then
            release_notes="OpenTurtle OS desktop release $RELEASE_TAG"$'\n'"${source_marker}"$'\n'"${run_marker}"
            create_args=(
              "$RELEASE_TAG"
              --repo "$RELEASE_REPOSITORY"
              --title "$RELEASE_TAG"
              --notes "$release_notes"
            )
            if [ "$RELEASE_CROSS_REPOSITORY" != "true" ]; then
              create_args+=(--target "$RELEASE_TARGET_SHA")
            fi
            gh release create "${create_args[@]}"
          else
            release_body="$(gh release view "$RELEASE_TAG" --repo "$RELEASE_REPOSITORY" --json body -q .body)"
            if [[ "$release_body" != *"$source_marker"* ]]; then
              echo "Release $RELEASE_TAG in $RELEASE_REPOSITORY does not match source marker: $source_marker" >&2
              exit 1
            fi
            if [[ "$release_body" != *"$run_marker"* ]]; then
              echo "Release $RELEASE_TAG in $RELEASE_REPOSITORY does not match workflow run marker: $run_marker" >&2
              exit 1
            fi
          fi

      - name: Upload release assets
        env:
          GH_TOKEN: ${{ secrets.RELEASE_REPOSITORY_TOKEN || github.token }}
          RELEASE_REPOSITORY: ${{ needs.resolve-release.outputs.release_repository }}
          RELEASE_TAG: ${{ needs.resolve-release.outputs.release_tag }}
        shell: bash
        run: |
          set -euo pipefail
          if [ -z "${GH_TOKEN:-}" ]; then
            echo "RELEASE_REPOSITORY_TOKEN is required to upload desktop release assets" >&2
            exit 1
          fi
          mapfile -t files < out/desktop-release-assets-upload.txt
          if [ "${#files[@]}" -eq 0 ]; then
            echo "No release assets were downloaded" >&2
            exit 1
          fi
          mapfile -t evidence_files < <(find out/desktop-release-evidence-bundle -type f -name 'release-evidence-bundle-*.json' | sort)
          if [ "${#evidence_files[@]}" -ne 1 ]; then
            echo "Expected exactly one release evidence bundle, found ${#evidence_files[@]}" >&2
            printf '%s\n' "${evidence_files[@]}" >&2
            exit 1
          fi
          mapfile -t stale_evidence_assets < <(
            gh release view "$RELEASE_TAG" \
              --repo "$RELEASE_REPOSITORY" \
              --json assets \
              --jq '.assets[].name | select(test("^release-evidence-bundle-.*\\.json$"))' || true
          )
          for stale_asset in "${stale_evidence_assets[@]}"; do
            gh release delete-asset "$RELEASE_TAG" "$stale_asset" \
              --repo "$RELEASE_REPOSITORY" \
              -y
          done
          files+=("${evidence_files[@]}")
          gh release upload "$RELEASE_TAG" "${files[@]}" \
            --repo "$RELEASE_REPOSITORY" \
            --clobber

      - name: Verify public release assets
        working-directory: packages/frontend
        env:
          GH_TOKEN: ${{ secrets.RELEASE_REPOSITORY_TOKEN || github.token }}
          RELEASE_REPOSITORY: ${{ needs.resolve-release.outputs.release_repository }}
          RELEASE_TAG: ${{ needs.resolve-release.outputs.release_tag }}
          RELEASE_TARGET_SHA: ${{ needs.resolve-release.outputs.source_sha }}
          RELEASE_SOURCE_REPOSITORY: ${{ env.SOURCE_REPOSITORY }}
          RELEASE_WORKFLOW_RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
          RUNTIME_ARTIFACT_MODE: ${{ needs.resolve-release.outputs.runtime_artifact_mode }}
        run: pnpm run verify:desktop-public-release -- ../../out/desktop-release-assets-upload.txt ../../out/desktop-release-evidence-bundle

      - name: Upload public release verification evidence
        uses: actions/upload-artifact@v4
        with:
          name: desktop-public-release-evidence
          if-no-files-found: error
          path: packages/frontend/out/desktop-public-release/desktop-public-release-*.json

  audit-release-workflow-result:
    needs:
      - resolve-release
      - release-preflight
      - package
      - renderer-assets
      - provider-runtime
      - audit-release-evidence
      - publish-release
    if: always()
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    steps:
      - name: Check out source
        uses: actions/checkout@v4
        with:
          repository: ${{ env.SOURCE_REPOSITORY }}
          ref: ${{ env.SOURCE_REF }}
          token: ${{ secrets.SOURCE_REPO_TOKEN || github.token }}
          fetch-depth: 0

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Enable Corepack
        run: corepack enable

      - name: Audit release workflow result
        working-directory: packages/frontend
        env:
          RELEASE_REPOSITORY: ${{ needs.resolve-release.outputs.release_repository }}
          RELEASE_TAG: ${{ needs.resolve-release.outputs.release_tag }}
          RELEASE_TARGET_SHA: ${{ needs.resolve-release.outputs.source_sha }}
          RELEASE_SOURCE_REPOSITORY: ${{ env.SOURCE_REPOSITORY }}
          RELEASE_WORKFLOW_RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
          RUNTIME_ARTIFACT_MODE: ${{ needs.resolve-release.outputs.runtime_artifact_mode }}
          JOB_RESULT_RESOLVE_RELEASE: ${{ needs.resolve-release.result }}
          JOB_RESULT_RELEASE_PREFLIGHT: ${{ needs.release-preflight.result }}
          JOB_RESULT_PACKAGE: ${{ needs.package.result }}
          JOB_RESULT_RENDERER_ASSETS: ${{ needs.renderer-assets.result }}
          JOB_RESULT_PROVIDER_RUNTIME: ${{ needs.provider-runtime.result }}
          JOB_RESULT_AUDIT_RELEASE_EVIDENCE: ${{ needs.audit-release-evidence.result }}
          JOB_RESULT_PUBLISH_RELEASE: ${{ needs.publish-release.result }}
        run: pnpm run verify:desktop-release-workflow-result

      - name: Upload release workflow result evidence
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: desktop-release-workflow-result
          if-no-files-found: warn
          path: packages/frontend/out/desktop-release-workflow/desktop-release-workflow-*.json
