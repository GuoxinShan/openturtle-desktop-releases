name: desktop-renderer-release

on:
  workflow_dispatch:
    inputs:
      source_ref:
        description: Source ref to build from
        required: false
        default: master
      source_repository:
        description: Source repository to check out
        required: true
        default: aka-danielZhang/openturtle-os
      base_ref:
        description: Base ref used by desktop-update-router
        required: false
        default: ''
      changed_files:
        description: Optional newline-separated changed files override
        required: false
        default: ''
      release_repository:
        description: Public release repository
        required: true
        default: GuoxinShan/openturtle-desktop-releases
      release_tag:
        description: Release tag to update
        required: true
        default: latest
      min_shell_version:
        description: Minimum compatible shell version
        required: false
        default: ''
      max_shell_version:
        description: Optional maximum compatible shell version
        required: false
        default: ''
      renderer_version:
        description: Optional renderer version override
        required: false
        default: ''

permissions:
  contents: write

concurrency:
  group: desktop-renderer-release-${{ inputs.release_repository }}-${{ inputs.release_tag }}
  cancel-in-progress: false

env:
  SOURCE_REPOSITORY: ${{ inputs.source_repository || 'aka-danielZhang/openturtle-os' }}
  SOURCE_REF: ${{ inputs.source_ref || 'master' }}

jobs:
  renderer-release-preflight:
    name: renderer release preflight
    runs-on: ubuntu-24.04
    timeout-minutes: 5
    outputs:
      release_tag: ${{ steps.target.outputs.release_tag }}
    steps:
      - name: Check out source
        uses: actions/checkout@v7
        with:
          repository: ${{ env.SOURCE_REPOSITORY }}
          ref: ${{ env.SOURCE_REF }}
          token: ${{ secrets.SOURCE_REPO_TOKEN || github.token }}
          fetch-depth: 0

      - name: Set up Node.js
        uses: actions/setup-node@v7
        with:
          node-version: 24

      - name: Resolve public release target
        id: target
        env:
          GH_TOKEN: ${{ secrets.RELEASE_REPOSITORY_TOKEN || github.token }}
          RELEASE_REPOSITORY: ${{ inputs.release_repository }}
          RELEASE_TAG_INPUT: ${{ inputs.release_tag }}
        shell: bash
        run: |
          set -euo pipefail
          release_tag="${RELEASE_TAG_INPUT}"
          if [ -z "${release_tag}" ] || [ "${release_tag}" = "latest" ]; then
            release_tag="$(gh release view --repo "${RELEASE_REPOSITORY}" --json tagName --jq '.tagName')"
          fi
          echo "release_tag=${release_tag}" >> "${GITHUB_OUTPUT}"

      - name: Validate renderer release inputs and token
        env:
          RELEASE_KIND: renderer
          RELEASE_REPOSITORY: ${{ inputs.release_repository }}
          RELEASE_TAG: ${{ steps.target.outputs.release_tag }}
          WORKFLOW_REPOSITORY: ${{ github.repository }}
          GITHUB_REF_TYPE: ${{ github.ref_type }}
          GITHUB_REF_NAME: ${{ github.ref_name }}
          RELEASE_REPOSITORY_TOKEN: ${{ secrets.RELEASE_REPOSITORY_TOKEN || github.token }}
          GITHUB_TOKEN: ${{ github.token }}
        shell: bash
        run: node packages/frontend/scripts/desktop-release-preflight.mjs

  renderer-release:
    needs: renderer-release-preflight
    runs-on: ubuntu-24.04
    timeout-minutes: 45
    outputs:
      renderer_version: ${{ steps.route.outputs.renderer_version }}
      min_shell_version: ${{ steps.route.outputs.min_shell_version }}
      source_sha: ${{ steps.release-context.outputs.source_sha }}
    steps:
      - name: Check out source
        uses: actions/checkout@v7
        with:
          repository: ${{ env.SOURCE_REPOSITORY }}
          ref: ${{ env.SOURCE_REF }}
          token: ${{ secrets.SOURCE_REPO_TOKEN || github.token }}
          fetch-depth: 0

      - name: Resolve renderer release context
        id: release-context
        shell: bash
        run: |
          set -euo pipefail
          source_sha="$(git rev-parse HEAD)"
          echo "source_sha=$source_sha" >> "$GITHUB_OUTPUT"

      - name: Set up Node.js
        uses: actions/setup-node@v7
        with:
          node-version: 24

      - name: Setup pnpm with Corepack
        shell: bash
        run: |
          corepack enable
          corepack prepare pnpm@9.15.0 --activate
          pnpm --version

      - name: Configure pnpm store
        run: pnpm config set store-dir .pnpm-store

      - name: Restore pnpm store cache
        uses: actions/cache@v6
        with:
          path: .pnpm-store
          key: ${{ runner.os }}-pnpm-store-renderer-${{ hashFiles('pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-pnpm-store-renderer-
            ${{ runner.os }}-pnpm-store-

      - name: Install dependencies
        run: pnpm --filter @openturtle/desktop... install --frozen-lockfile --prefer-offline

      - name: Route desktop update
        id: route
        env:
          MODE: auto
          BASE_REF: ${{ inputs.base_ref }}
          HEAD_REF: HEAD
          CHANGED_FILES: ${{ inputs.changed_files }}
          MIN_SHELL_VERSION: ${{ inputs.min_shell_version }}
          RENDERER_VERSION: ${{ inputs.renderer_version }}
        run: node packages/frontend/scripts/desktop-update-router.mjs

      - name: Enforce renderer-only release surface
        if: steps.route.outputs.mode != 'renderer'
        run: |
          echo "desktop-renderer-release requires mode=renderer, got '${{ steps.route.outputs.mode }}': ${{ steps.route.outputs.reason }}" >&2
          exit 1

      - name: Build desktop renderer
        working-directory: packages/frontend
        run: pnpm --filter @openturtle/desktop build

      - name: Package renderer update assets
        working-directory: packages/frontend
        env:
          RELEASE_REPOSITORY: ${{ inputs.release_repository }}
          RELEASE_TAG: ${{ needs.renderer-release-preflight.outputs.release_tag }}
          RENDERER_VERSION: ${{ steps.route.outputs.renderer_version }}
          MIN_SHELL_VERSION: ${{ steps.route.outputs.min_shell_version }}
          MAX_SHELL_VERSION: ${{ inputs.max_shell_version }}
        run: pnpm run package:renderer-update

      - name: Ensure public release exists
        env:
          GH_TOKEN: ${{ secrets.RELEASE_REPOSITORY_TOKEN || github.token }}
          RELEASE_REPOSITORY: ${{ inputs.release_repository }}
          RELEASE_TAG: ${{ needs.renderer-release-preflight.outputs.release_tag }}
          RELEASE_TARGET_SHA: ${{ steps.release-context.outputs.source_sha }}
          RELEASE_SOURCE_REPOSITORY: ${{ env.SOURCE_REPOSITORY }}
          RELEASE_WORKFLOW_RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: |
          set -euo pipefail
          if [ -z "${GH_TOKEN:-}" ]; then
            echo "RELEASE_REPOSITORY_TOKEN is required to create the renderer release" >&2
            exit 1
          fi
          source_marker="Source: ${RELEASE_SOURCE_REPOSITORY}@${RELEASE_TARGET_SHA}"
          run_marker="Run: ${RELEASE_WORKFLOW_RUN_URL}"
          release_notes="OpenTurtle OS renderer release $RELEASE_TAG"$'\n'"${source_marker}"$'\n'"${run_marker}"
          if ! gh release view "$RELEASE_TAG" --repo "$RELEASE_REPOSITORY" >/dev/null 2>&1; then
            gh release create "$RELEASE_TAG" \
              --repo "$RELEASE_REPOSITORY" \
              --title "$RELEASE_TAG" \
              --notes "$release_notes"
          fi

      - name: Update renderer release notes
        env:
          GH_TOKEN: ${{ secrets.RELEASE_REPOSITORY_TOKEN || github.token }}
          RELEASE_REPOSITORY: ${{ inputs.release_repository }}
          RELEASE_TAG: ${{ needs.renderer-release-preflight.outputs.release_tag }}
          RELEASE_TARGET_SHA: ${{ steps.release-context.outputs.source_sha }}
          RELEASE_SOURCE_REPOSITORY: ${{ env.SOURCE_REPOSITORY }}
          RELEASE_WORKFLOW_RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        shell: bash
        run: |
          set -euo pipefail
          if [ -z "${GH_TOKEN:-}" ]; then
            echo "RELEASE_REPOSITORY_TOKEN is required to update renderer release notes" >&2
            exit 1
          fi
          source_marker="Source: ${RELEASE_SOURCE_REPOSITORY}@${RELEASE_TARGET_SHA}"
          run_marker="Run: ${RELEASE_WORKFLOW_RUN_URL}"
          release_notes="OpenTurtle OS renderer release $RELEASE_TAG"$'\n'"${source_marker}"$'\n'"${run_marker}"
          gh release edit "$RELEASE_TAG" \
            --repo "$RELEASE_REPOSITORY" \
            --notes "$release_notes"

      - name: Prune stale renderer release assets
        env:
          GH_TOKEN: ${{ secrets.RELEASE_REPOSITORY_TOKEN || github.token }}
          RELEASE_REPOSITORY: ${{ inputs.release_repository }}
          RELEASE_TAG: ${{ needs.renderer-release-preflight.outputs.release_tag }}
        shell: bash
        run: |
          set -euo pipefail
          if [ -z "${GH_TOKEN:-}" ]; then
            echo "RELEASE_REPOSITORY_TOKEN is required to prune stale renderer release assets" >&2
            exit 1
          fi
          while IFS= read -r asset_name; do
            if [[ "$asset_name" == renderer-update.json || "$asset_name" == OpenTurtle.OS-renderer-* ]]; then
              gh release delete-asset "$RELEASE_TAG" "$asset_name" \
                --repo "$RELEASE_REPOSITORY" \
                -y
            fi
          done < <(gh release view "$RELEASE_TAG" --repo "$RELEASE_REPOSITORY" --json assets -q '.assets[].name')

      - name: Upload renderer assets
        working-directory: packages/frontend
        env:
          GH_TOKEN: ${{ secrets.RELEASE_REPOSITORY_TOKEN || github.token }}
          RELEASE_REPOSITORY: ${{ inputs.release_repository }}
          RELEASE_TAG: ${{ needs.renderer-release-preflight.outputs.release_tag }}
          RENDERER_VERSION: ${{ steps.route.outputs.renderer_version }}
        run: |
          if [ -z "${GH_TOKEN:-}" ]; then
            echo "RELEASE_REPOSITORY_TOKEN is required to upload renderer release assets" >&2
            exit 1
          fi
          gh release upload "$RELEASE_TAG" \
            "apps/desktop/dist/OpenTurtle.OS-renderer-${RENDERER_VERSION}.zip" \
            "apps/desktop/dist/OpenTurtle.OS-renderer-${RENDERER_VERSION}.json" \
            "apps/desktop/dist/renderer-update.json" \
            --repo "$RELEASE_REPOSITORY" \
            --clobber

      - name: Verify public renderer release assets
        working-directory: packages/frontend
        env:
          GH_TOKEN: ${{ secrets.RELEASE_REPOSITORY_TOKEN || github.token }}
          RELEASE_REPOSITORY: ${{ inputs.release_repository }}
          RELEASE_TAG: ${{ needs.renderer-release-preflight.outputs.release_tag }}
          RELEASE_TARGET_SHA: ${{ steps.release-context.outputs.source_sha }}
          RELEASE_SOURCE_REPOSITORY: ${{ env.SOURCE_REPOSITORY }}
          RELEASE_WORKFLOW_RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
          RENDERER_VERSION: ${{ steps.route.outputs.renderer_version }}
          MIN_SHELL_VERSION: ${{ steps.route.outputs.min_shell_version }}
          MAX_SHELL_VERSION: ${{ inputs.max_shell_version }}
        run: pnpm run verify:desktop-renderer-public-release -- apps/desktop/dist

      - name: Upload public renderer release verification evidence
        uses: actions/upload-artifact@v7
        with:
          name: desktop-renderer-public-release-evidence
          if-no-files-found: error
          path: packages/frontend/out/desktop-renderer-public-release/desktop-renderer-public-release-*.json

      - name: Upload renderer workflow artifacts
        uses: actions/upload-artifact@v7
        with:
          name: desktop-renderer-release-${{ steps.route.outputs.renderer_version }}
          if-no-files-found: error
          path: |
            packages/frontend/apps/desktop/dist/OpenTurtle.OS-renderer-${{ steps.route.outputs.renderer_version }}.zip
            packages/frontend/apps/desktop/dist/OpenTurtle.OS-renderer-${{ steps.route.outputs.renderer_version }}.json
            packages/frontend/apps/desktop/dist/renderer-update.json

  audit-renderer-release-workflow-result:
    needs:
      - renderer-release-preflight
      - renderer-release
    if: always()
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    steps:
      - name: Check out source
        uses: actions/checkout@v7
        with:
          repository: ${{ env.SOURCE_REPOSITORY }}
          ref: ${{ env.SOURCE_REF }}
          token: ${{ secrets.SOURCE_REPO_TOKEN || github.token }}
          fetch-depth: 0

      - name: Set up Node.js
        uses: actions/setup-node@v7
        with:
          node-version: 24

      - name: Audit renderer release workflow result
        working-directory: packages/frontend
        env:
          RELEASE_REPOSITORY: ${{ inputs.release_repository }}
          RELEASE_TAG: ${{ needs.renderer-release-preflight.outputs.release_tag }}
          RELEASE_TARGET_SHA: ${{ needs.renderer-release.outputs.source_sha }}
          RELEASE_SOURCE_REPOSITORY: ${{ env.SOURCE_REPOSITORY }}
          RELEASE_WORKFLOW_RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
          RENDERER_VERSION: ${{ needs.renderer-release.outputs.renderer_version }}
          JOB_RESULT_RENDERER_RELEASE_PREFLIGHT: ${{ needs.renderer-release-preflight.result }}
          JOB_RESULT_RENDERER_RELEASE: ${{ needs.renderer-release.result }}
        run: pnpm run verify:desktop-renderer-release-workflow-result

      - name: Upload renderer release workflow result evidence
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: desktop-renderer-release-workflow-result
          if-no-files-found: warn
          path: packages/frontend/out/desktop-renderer-release-workflow/desktop-renderer-release-workflow-*.json
